<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch自動發話給GP</title>
    <link rel="icon" href="start.gif" type="image/gif" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://marsantony.github.io/shared/nav.css">

    <style>
        :root {
            --bg: #c8ccd6;
            --shadow-dark: #a0a4ae;
            --shadow-light: #f0f4fc;
            --text-primary: #2a3040;
            --text-secondary: #505868;
            --text-muted: #808898;
            --accent: #5a7aed;
            --danger: #c0392b;
            --success: #2d7a4f;
            --neu-raised: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-raised-sm: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            --neu-pressed: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            --nav-bg: rgba(208, 212, 222, 0.4);
            --nav-text: #2a3040;
            --nav-text-secondary: #505868;
            --footer-border: #bec2ca;
            --footer-text: #808898;
            --footer-link-color: #5a7aed;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.35) 0%, transparent 50%),
                repeating-linear-gradient(
                    135deg,
                    rgba(255,255,255,0.12) 0px,
                    rgba(255,255,255,0) 1px,
                    rgba(0,0,0,0.08) 1px,
                    rgba(0,0,0,0) 2px
                ),
                linear-gradient(135deg, #f0f2f6 0%, #d8dce4 25%, #c4c8d2 50%, #aeb2bc 80%, #a0a4ae 100%);
            background-attachment: fixed;
            color: var(--text-secondary);
            line-height: 1.6;
            padding-top: 56px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--shadow-dark);
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }

        .form-group label a,
        .form-group .form-link {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .form-group label a:hover,
        .form-group .form-link:hover {
            color: var(--accent);
        }

        .form-hint {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--bg);
            box-shadow: var(--neu-pressed);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            transition: box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        textarea {
            resize: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        /* ── Buttons ── */
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: flex-end;
            margin: 1.5rem 0;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: 12px;
            background: var(--bg);
            box-shadow: var(--neu-raised-sm);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: box-shadow 0.2s, color 0.2s;
            color: var(--text-secondary);
        }

        .btn:hover {
            box-shadow: var(--neu-pressed);
            color: var(--accent);
        }

        .btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
        }

        .btn:disabled:hover {
            box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
            color: var(--text-secondary);
        }

        .btn-primary { color: var(--accent); }
        .btn-success { color: var(--success); }
        .btn-danger  { color: var(--danger); }

        /* ── Excel image tooltip ── */
        .excel-info {
            display: inline-block;
            position: relative;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: 0.25rem;
        }

        .excel-info > img {
            display: none;
        }

        .excel-info:hover > img {
            display: block;
            position: absolute;
            z-index: 10;
            max-width: 300px;
            border-radius: 8px;
            box-shadow: var(--neu-raised);
        }

        /* ── Tutorial link ── */
        .tutorial-link {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 0.5rem;
            text-align: right;
            transition: color 0.2s;
        }

        .tutorial-link:hover {
            color: var(--accent);
        }

        /* ── Attribution ── */
        .attribution {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--shadow-dark);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .attribution a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .attribution a:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Twitch自動發話給GP</h1>

        <div id="authLoggedOut" class="form-group">
            <button type="button" id="twitchLogin" class="btn btn-primary">使用 Twitch 登入</button>
        </div>
        <div id="authLoggedIn" style="display:none;">
            <div class="form-group">
                <span class="form-hint">已登入：<strong id="authUsername"></strong></span>
                <button type="button" id="twitchLogout" class="btn btn-danger">登出</button>
            </div>

            <form>
                <div class="form-group">
                    <label>
                        載入忠誠點數換GP列表Excel（GP固定3000）
                        <span class="excel-info">&#9432;<img src="./images/LoadExcel.jpg" width="300" /></span>
                    </label>
                    <input type="file" id="fileExcel" required />
                </div>

                <a class="tutorial-link" href="https://youtu.be/TsGoplqJPYI" target="_blank">開始自動發話 教學影片</a>

                <div class="btn-row">
                    <button type="button" id="autoSend" class="btn btn-primary">開始自動發話</button>
                    <button type="button" id="complete" class="btn btn-success" disabled style="display:none;">完成</button>
                    <button type="button" id="processing" class="btn btn-danger" disabled style="display:none;">處理中</button>
                </div>
            </form>
        </div>

        <div class="form-group">
            <label for="log">回覆的LOG</label>
            <textarea id="log" rows="10" readonly></textarea>
        </div>

        <div class="attribution">
            <a href="https://www.flaticon.com/free-animated-icons/on" title="on animated icons">On animated icons created by Freepik - Flaticon</a>
        </div>
    </div>

    <script src="https://marsantony.github.io/shared/twitch-auth.js"></script>
    <script src="./js/tmi.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>

    <script src="https://marsantony.github.io/shared/shared.js"></script>
    <script>
        let XLSX_Data = [];
        const logEl = document.getElementById('log');

        function addLog(message) {
            logEl.value = message + '\r\n' + logEl.value;
        }

        function downloadXLSXFile(data) {
            const now = moment().format('YYYYMMDDHHmmss');
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'GP發送');
            const fileName = `${now}_GP發送列表.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }

        document.getElementById('fileExcel').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet);

                XLSX_Data = jsonData;
                addLog(JSON.stringify(jsonData, null, 2));
            };

            reader.readAsArrayBuffer(file);
        });
    </script>

    <script type="module">
        import { buildSendCommand, parseExcelFirstColumn, buildReportRow, parseCommandEcho, isProcessingComplete } from './src/auto-send-utils.js';

        const CLIENT_ID = 'iq44451ylnoywa6g8yal91e1ajsu1e';
        const GGPCOMMAND = 'ggp';
        const GPAMOUNT = '3000';

        const authLoggedOutEl = document.getElementById('authLoggedOut');
        const authLoggedInEl = document.getElementById('authLoggedIn');
        const authUsernameEl = document.getElementById('authUsername');

        // ── Auth UI ──
        const updateAuthUI = () => {
            const loggedIn = TwitchAuth.isLoggedIn();
            authLoggedOutEl.style.display = loggedIn ? 'none' : '';
            authLoggedInEl.style.display = loggedIn ? '' : 'none';
            if (loggedIn) {
                authUsernameEl.textContent = TwitchAuth.getUsername();
            }
        };

        document.getElementById('twitchLogin').addEventListener('click', () => {
            TwitchAuth.showLoginDialog(CLIENT_ID);
        });

        document.getElementById('twitchLogout').addEventListener('click', () => {
            TwitchAuth.logout().then(() => {
                updateAuthUI();
            });
        });

        class autoSendMessageClass {

            #channels;
            #client;

            constructor(options) {
                if (!options || !options.autoSendButtonName ||
                    !options.completeButtonName || !options.processingButtonName ||
                    !options.sendMessage || typeof options.sendMessage !== 'function') {
                    return;
                }

                this.autoSendButtonName = options.autoSendButtonName;
                this.completeButtonName = options.completeButtonName;
                this.processingButtonName = options.processingButtonName;
                this.sendMessage = options.sendMessage;
            }

            #connect() {
                const username = TwitchAuth.getUsername();
                this.#client = new tmi.Client({
                    options: {
                        debug: false,
                        skipMembership: true,
                        skipUpdatingEmotesets: true,
                    },
                    connection: {
                        reconnect: true,
                        secure: true
                    },
                    identity: {
                        username: username,
                        password: TwitchAuth.getToken()
                    },
                    channels: this.#channels
                });

                this.#client.connect().catch(console.error);
            }

            #showProcessing() {
                document.getElementById(this.autoSendButtonName).style.display = 'none';
                document.getElementById(this.completeButtonName).style.display = 'none';
                document.getElementById(this.processingButtonName).style.display = '';
            }

            #showComplete() {
                document.getElementById(this.autoSendButtonName).style.display = 'none';
                document.getElementById(this.completeButtonName).style.display = '';
                document.getElementById(this.processingButtonName).style.display = 'none';
            }

            init() {
                document.getElementById(this.autoSendButtonName).addEventListener('click', () => {
                    const form = document.getElementsByTagName('form')[0];
                    if(!form.checkValidity()) {
                        form.reportValidity();
                        return;
                    }

                    if(!XLSX_Data || !Array.isArray(XLSX_Data) || XLSX_Data.length === 0) {
                        addLog('Excel未載入成功或沒有資料');
                        return;
                    }

                    this.#channels = [TwitchAuth.getUsername()];

                    this.#showProcessing();
                    if (!this.#client)
                        this.#connect();

                    const accounts = parseExcelFirstColumn(XLSX_Data);
                    const givenAccounts = [];
                    this.#client.on('join', () => {
                        accounts.forEach((account, index) => {
                            const message = this.sendMessage(account, GPAMOUNT);
                            setTimeout(() => { this.#client.say(`${this.#channels[0]}`, message); }, 3000 * index);
                        });
                    });

                    this.#client.on('message', (channel, tags, message, self) => {
                        if (!self) return;

                        const parsed = parseCommandEcho(message, GGPCOMMAND);
                        if (!parsed) return;

                        givenAccounts.push(buildReportRow(parsed.account, accounts));

                        const name = tags['display-name'] ? `${tags['display-name']}(${tags['username']})` : tags['username'];
                        const timeStamp = moment().format('YYYY/MM/DD HH:mm:ss');
                        addLog(`${timeStamp} ${name}，發話：${message}`);

                        if(isProcessingComplete(givenAccounts.length, accounts.length)) {
                            downloadXLSXFile(givenAccounts);
                            this.#showComplete();
                        }
                    });
                });
            }
        }

        new autoSendMessageClass({
            autoSendButtonName: 'autoSend',
            completeButtonName: 'complete',
            processingButtonName: 'processing',
            sendMessage: (account, gpAmount) => buildSendCommand(GGPCOMMAND, account, gpAmount)
        }).init();

        // ── Init ──
        TwitchAuth.tryRestore().then(() => {
            updateAuthUI();
        });
    </script>
</body>

</html>
